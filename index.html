<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web AI</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        h2 { text-align: center; color: #333; }
        #chat-box { border: 1px solid #ccc; padding: 15px; height: 300px; overflow-y: auto; margin-bottom: 15px; border-radius: 5px; background: #f9f9f9; line-height: 1.5; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>My Web AI Assistant</h2>
    <div id="chat-box">உங்களுக்கு எப்படி உதவலாம்?</div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="உங்கள் கேள்வியை இங்கே கேட்கவும்...">
        <button onclick="askAI()">அனுப்பு</button>
    </div>

    <script>
        // எச்சரிக்கை: இதை Public GitHub-ல் push செய்ய வேண்டாம்!
        const API_KEY = "AQ.Ab8RN6L5NgM3CAsfvJAOtaOikLpQkdrKtSR4CBN8PlYEoA4CoQ";

        async function askAI() {
            const prompt = document.getElementById("user-input").value;
            const chatBox = document.getElementById("chat-box");
            
            if (!prompt) {
                alert("தயவுசெய்து ஒரு கேள்வியை கேட்கவும்!");
                return;
            }

            // யூசர் கேள்வியை சாட் பாக்சில் காட்டுதல்
            chatBox.innerHTML = `<b>நீங்கள்:</b> ${prompt} <br><br> <i>AI யோசிக்கிறது...</i>`;
            document.getElementById("user-input").value = ""; // இன்புட் பாக்ஸை க்ளியர் செய்ய

            try {
                // Gemini API-க்கு Request அனுப்புதல்
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                // AI-இன் பதிலை எடுத்து சாட் பாக்சில் காட்டுதல்
                if(data.candidates && data.candidates.length > 0) {
                    // குறிப்பு: \n (New line) களை <br> ஆக மாற்றுவது டெக்ஸ்டை சரியாக காட்டும்
                    const aiText = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                    chatBox.innerHTML = `<b>நீங்கள்:</b> ${prompt} <br><br> <b>AI:</b> ${aiText}`;
                } else {
                    chatBox.innerHTML = `<b>நீங்கள்:</b> ${prompt} <br><br> <b>AI:</b> மன்னிக்கவும், எனக்கு பதில் கிடைக்கவில்லை.`;
                }

            } catch (error) {
                console.error("Error:", error);
                chatBox.innerHTML = `<b>நீங்கள்:</b> ${prompt} <br><br> <b style="color:red;">எரர்:</b> AI உடன் தொடர்பு கொள்ள முடியவில்லை. API Key சரியாக உள்ளதா என சரிபார்க்கவும்.`;
            }
        }
    </script>
</body>
</html>
