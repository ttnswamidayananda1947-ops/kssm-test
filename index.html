<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Gemini Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #ffffff; height: 100vh; display: flex; }
        .left-panel { width: 40%; border-right: 2px solid #eeeeee; padding: 30px; display: flex; flex-direction: column; justify-content: center; background-color: #fafafa; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #cccccc; border-radius: 8px; resize: none; font-size: 16px; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 12px; background-color: #0070f3; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #cccccc; }
        .right-panel { width: 60%; padding: 40px; display: flex; flex-direction: column; background-color: #ffffff; overflow-y: auto; }
        .output-box { font-size: 18px; line-height: 1.6; color: #222222; white-space: pre-wrap; }
        .status-text { color: #888888; font-style: italic; }
    </style>
</head>
<body>

    <div class="left-panel">
        <h2>Gemini AI உதவியாளர் (Netlify)</h2>
        <textarea id="userInput" placeholder="உங்கள் கேள்வியை இங்கே டைப் செய்யுங்கள்..."></textarea>
        <button id="sendBtn" onclick="askGemini()">கேள்வி கேள்</button>
    </div>

    <div class="right-panel">
        <div id="outputBox" class="output-box">
            <span class="status-text">இங்கே AI-இன் பதில் தோன்றும்...</span>
        </div>
    </div>

    <script>
        async function askGemini() {
            const inputEl = document.getElementById("userInput");
            const outputEl = document.getElementById("outputBox");
            const btnEl = document.getElementById("sendBtn");
            
            const text = inputEl.value.trim();
            if (!text) return;

            btnEl.disabled = true;
            outputEl.innerHTML = `<span class="status-text">Gemini சிந்தித்துக் கொண்டிருக்கிறது...</span>`;

            try {
                // Netlify Functions-ஐ அழைக்கும் வழி
                const response = await fetch('/.netlify/functions/chat', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                if (data.text) {
                    outputEl.innerText = data.text;
                } else {
                    outputEl.innerText = "பதில் பெற முடியவில்லை. Netlify செட்டிங்ஸை சரிபார்க்கவும்.";
                }
            } catch (error) {
                outputEl.innerText = "இணைப்பில் தவறு நடந்துள்ளது!";
            } finally {
                btnEl.disabled = false;
            }
        }
    </script>
</body>
</html>
